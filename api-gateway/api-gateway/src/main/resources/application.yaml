server:
  port: 8084

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - Authorization
                  - Content-Type
                  - X-User-Id
                  - X-Username
                allowCredentials: true
                maxAge: 3600
          routes:

            - id: product-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/products/**

            - id: cart-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/cart/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**

            - id: auth-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/auth/**
