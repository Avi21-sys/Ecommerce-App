spring.application.name=auth-service

server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_auth
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.ecommerce.auth_service=DEBUG
logging.level.com.ecommerce.auth_service.controller=INFO
logging.level.com.ecommerce.auth_service.service=DEBUG
logging.level.com.ecommerce.auth_service.exception=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/auth-service.log
logging.file.max-size=10MB
logging.file.max-history=10

